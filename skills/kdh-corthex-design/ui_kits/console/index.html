<!doctype html>
<html lang="ko" data-theme="paper">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>corthex console — UI kit</title>
  <link rel="stylesheet" href="kit.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="ChatScreen.jsx"></script>
  <script type="text/babel" src="ProfilePage.jsx"></script>
  <script type="text/babel" src="ActivityPage.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [theme, setTheme]             = useState(() => localStorage.getItem('corthex.theme') || 'paper');
      const [page, setPage]               = useState(() => localStorage.getItem('corthex.page')  || 'hub');
      const [activeAgent, setActiveAgent] = useState(() => localStorage.getItem('corthex.agent') || 'secretary');

      useEffect(() => { document.documentElement.dataset.theme = theme; localStorage.setItem('corthex.theme', theme); }, [theme]);
      useEffect(() => { localStorage.setItem('corthex.page', page); }, [page]);
      useEffect(() => { localStorage.setItem('corthex.agent', activeAgent); }, [activeAgent]);

      return (
        <>
          <div className="shell">
            <Sidebar
              page={page} setPage={setPage}
              activeAgent={activeAgent} setActiveAgent={setActiveAgent}
              agents={AGENTS}
            />
            <main className="main" data-screen-label="main">
              {page === 'hub'      && <ChatScreen activeAgent={activeAgent} />}
              {page === 'profile'  && <ProfilePage theme={theme} setTheme={setTheme} />}
              {page === 'activity' && <ActivityPage />}
              {page === 'org'      && <div className="page"><h1>조직도 · NEXUS</h1><div className="acard"><p style={{ color: 'hsl(var(--muted-foreground))' }}>Phase 3에서 구현 예정. (UI kit의 이 화면은 Phase 1–2 범위 밖입니다.)</p></div></div>}
              {page === 'notif'    && <div className="page"><h1>알림</h1><div className="acard"><p style={{ color: 'hsl(var(--muted-foreground))' }}>현재 새 알림이 없습니다.</p></div></div>}
            </main>
          </div>

          <div className="seg" role="tablist" aria-label="Theme">
            {['paper','carbon','signal'].map(t => (
              <button key={t} className={theme === t ? 'active' : ''} onClick={() => setTheme(t)}>{t}</button>
            ))}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
