<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Motion grammar</title>
</head><body><div class="card col gap-md">
  <div class="eyebrow muted">motion · punctuation, not performance</div>
  <div class="body">transitions ≤ <span class="mono">150 ms</span> · <span class="mono">cubic-bezier(0.16, 1, 0.3, 1)</span></div>
  <div class="col gap-sm" style="margin-top:4px">
    <div class="row gap-sm body-sm">
      <span style="width:96px" class="caption muted">ALLOWED</span>
      <span>fade · translate 1px · accordion height · skeleton pulse 500ms · stream cursor blink 500ms</span>
    </div>
    <div class="row gap-sm body-sm">
      <span style="width:96px" class="caption muted">NEVER</span>
      <span style="color:hsl(var(--destructive))">parallax · scroll-jack · bounce · elastic · hover-lift · pulse hero · decorative loops</span>
    </div>
  </div>
</div></body></html>
