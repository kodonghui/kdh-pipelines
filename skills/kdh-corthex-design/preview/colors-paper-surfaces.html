<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Colors — Paper surfaces</title>
</head><body><div class="card col gap-lg">
  <div class="row gap-xl" style="flex-wrap:wrap;">
    <div class="col gap-xs"><div class="swatch" style="background:hsl(40 20% 98%)"></div>
      <div class="token-label">background</div><div class="token-meta">40 20% 98%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(0 0% 100%)"></div>
      <div class="token-label">card</div><div class="token-meta">0 0% 100%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(40 22% 96%)"></div>
      <div class="token-label">sidebar-bg</div><div class="token-meta">40 22% 96%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(220 14% 96%)"></div>
      <div class="token-label">muted</div><div class="token-meta">220 14% 96%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(220 14% 94%)"></div>
      <div class="token-label">secondary</div><div class="token-meta">220 14% 94%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(220 15% 11%)"></div>
      <div class="token-label">foreground</div><div class="token-meta">220 15% 11%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(220 9% 40%)"></div>
      <div class="token-label">muted-fg</div><div class="token-meta">220 9% 40%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(220 13% 88%)"></div>
      <div class="token-label">border</div><div class="token-meta">220 13% 88%</div></div>
  </div>
</div></body></html>
