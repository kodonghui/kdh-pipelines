<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Colors — Primary per theme</title>
</head><body><div class="card col gap-xl">
  <div class="eyebrow muted">primary — one per theme, action only</div>
  <div class="row gap-xl" style="flex-wrap:wrap;">
    <div class="col gap-sm">
      <div class="swatch" style="background:hsl(222 47% 20%); width:96px; height:72px;"></div>
      <div class="col gap-xs">
        <div class="token-label">Paper · deep ink blue</div>
        <div class="token-meta">hsl(222 47% 20%) · #1B2A4A</div>
      </div>
    </div>
    <div class="col gap-sm">
      <div class="swatch" style="background:hsl(212 90% 70%); width:96px; height:72px;"></div>
      <div class="col gap-xs">
        <div class="token-label">Carbon · ice blue</div>
        <div class="token-meta">hsl(212 90% 70%) · #5FA8F7</div>
      </div>
    </div>
    <div class="col gap-sm">
      <div class="swatch" style="background:hsl(14 84% 42%); width:96px; height:72px;"></div>
      <div class="col gap-xs">
        <div class="token-label">Signal · burnt sienna</div>
        <div class="token-meta">hsl(14 84% 42%) · #C23E15</div>
      </div>
    </div>
  </div>
</div></body></html>
