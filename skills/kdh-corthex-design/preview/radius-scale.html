<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Radius scale</title>
</head><body><div class="card col gap-md">
  <div class="eyebrow muted">radius · base 8 (12 retired 2026-04-18)</div>
  <div class="row gap-lg" style="flex-wrap:wrap;">
    <div class="col gap-xs"><div style="width:64px;height:64px;background:hsl(var(--secondary));border:1px solid hsl(var(--border));border-radius:0"></div><div class="caption">none · 0</div></div>
    <div class="col gap-xs"><div style="width:64px;height:64px;background:hsl(var(--secondary));border:1px solid hsl(var(--border));border-radius:4px"></div><div class="caption">sm · 4</div></div>
    <div class="col gap-xs"><div style="width:64px;height:64px;background:hsl(var(--secondary));border:1px solid hsl(var(--border));border-radius:6px"></div><div class="caption">md · 6</div></div>
    <div class="col gap-xs"><div style="width:64px;height:64px;background:hsl(var(--secondary));border:1px solid hsl(var(--border));border-radius:8px"></div><div class="caption">base · 8</div></div>
    <div class="col gap-xs"><div style="width:64px;height:64px;background:hsl(var(--secondary));border:1px solid hsl(var(--border));border-radius:12px"></div><div class="caption">lg · 12</div></div>
    <div class="col gap-xs"><div style="width:64px;height:64px;background:hsl(var(--secondary));border:1px solid hsl(var(--border));border-radius:9999px"></div><div class="caption">full</div></div>
  </div>
</div></body></html>
