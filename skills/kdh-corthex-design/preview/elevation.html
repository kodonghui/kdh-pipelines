<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Elevation / shadow</title>
</head><body><div class="card col gap-md">
  <div class="eyebrow muted">elevation · never default chrome</div>
  <div class="row gap-xl" style="padding:16px 0;">
    <div class="col gap-xs"><div style="width:88px;height:72px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:8px;box-shadow:0 1px 2px 0 hsl(220 15% 11% / 0.05)"></div><div class="caption">sm · card resting</div></div>
    <div class="col gap-xs"><div style="width:88px;height:72px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:8px;box-shadow:0 4px 12px -2px hsl(220 15% 11% / 0.08),0 2px 4px -2px hsl(220 15% 11% / 0.04)"></div><div class="caption">md · popover</div></div>
    <div class="col gap-xs"><div style="width:88px;height:72px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:8px;box-shadow:0 12px 28px -8px hsl(220 15% 11% / 0.12),0 4px 12px -4px hsl(220 15% 11% / 0.06)"></div><div class="caption">lg · toast</div></div>
    <div class="col gap-xs"><div style="width:88px;height:72px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:8px;box-shadow:0 24px 48px -12px hsl(220 15% 11% / 0.18),0 8px 16px -4px hsl(220 15% 11% / 0.08)"></div><div class="caption">xl · dialog</div></div>
  </div>
</div></body></html>
