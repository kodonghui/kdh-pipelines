<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Spacing scale</title>
</head><body><div class="card col gap-md">
  <div class="eyebrow muted">spacing · 8-px grid (4-px sub-atomic)</div>
  <div class="col gap-sm">
    <div class="row gap-md"><div class="mono" style="width:48px">xs · 4</div><div style="width:4px;height:16px;background:hsl(var(--primary))"></div></div>
    <div class="row gap-md"><div class="mono" style="width:48px">sm · 8</div><div style="width:8px;height:16px;background:hsl(var(--primary))"></div></div>
    <div class="row gap-md"><div class="mono" style="width:48px">md · 12</div><div style="width:12px;height:16px;background:hsl(var(--primary))"></div></div>
    <div class="row gap-md"><div class="mono" style="width:48px">lg · 16</div><div style="width:16px;height:16px;background:hsl(var(--primary))"></div></div>
    <div class="row gap-md"><div class="mono" style="width:48px">xl · 24</div><div style="width:24px;height:16px;background:hsl(var(--primary))"></div></div>
    <div class="row gap-md"><div class="mono" style="width:48px">2xl · 32</div><div style="width:32px;height:16px;background:hsl(var(--primary))"></div></div>
    <div class="row gap-md"><div class="mono" style="width:48px">3xl · 48</div><div style="width:48px;height:16px;background:hsl(var(--primary))"></div></div>
    <div class="row gap-md"><div class="mono" style="width:48px">4xl · 64</div><div style="width:64px;height:16px;background:hsl(var(--primary))"></div></div>
  </div>
</div></body></html>
