<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Inputs + form</title>
<style>
.input{height:36px;padding:0 12px;border:1px solid hsl(var(--input));border-radius:8px;background:transparent;color:hsl(var(--foreground));font:400 14px/1 var(--font-sans);outline:none;width:240px;}
.input::placeholder{color:hsl(var(--muted-foreground))}
.input:focus-visible{outline:2px solid hsl(var(--ring));outline-offset:1px;border-color:transparent}
.input.error{border-color:hsl(var(--destructive));outline:2px solid hsl(var(--destructive));outline-offset:1px}
.textarea{min-height:88px;padding:8px 12px;border:1px solid hsl(var(--input));border-radius:8px;background:transparent;color:hsl(var(--foreground));font:400 14px/20px var(--font-sans);width:320px;resize:vertical;}
.label{font:400 13px/20px var(--font-sans);color:hsl(var(--muted-foreground));margin-bottom:4px;display:block}
.err{font:500 12px/16px var(--font-sans);color:hsl(var(--destructive));margin-top:4px}
</style></head><body><div class="card col gap-md">
  <div class="eyebrow muted">inputs · focus ring 2px ring-offset 1px</div>
  <div class="row gap-xl" style="align-items:flex-start">
    <div>
      <label class="label">이메일</label>
      <input class="input" placeholder="ceo@company.co.kr">
    </div>
    <div>
      <label class="label">회사명</label>
      <input class="input error" value="코텍스 주식회사">
      <div class="err">이미 등록된 회사입니다.</div>
    </div>
  </div>
  <div>
    <label class="label">첫 요청</label>
    <textarea class="textarea" placeholder="이번 주 매출 분석해줘"></textarea>
  </div>
</div></body></html>
