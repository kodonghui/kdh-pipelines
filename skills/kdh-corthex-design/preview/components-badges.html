<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Badges</title>
<style>
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:9999px;font:500 11px/16px var(--font-sans);letter-spacing:0.01em}
.b-default{background:hsl(var(--secondary));color:hsl(var(--secondary-foreground))}
.b-primary{background:hsl(var(--primary));color:hsl(var(--primary-foreground))}
.b-destructive{background:hsl(var(--destructive));color:hsl(var(--destructive-foreground))}
.b-success{background:hsl(var(--success));color:hsl(var(--success-foreground))}
.b-warning{background:hsl(var(--warning));color:hsl(var(--warning-foreground))}
.b-info{background:hsl(var(--info));color:hsl(var(--info-foreground))}
.b-outline{background:transparent;border:1px solid hsl(var(--border));color:hsl(var(--foreground))}
</style></head><body><div class="card col gap-md">
  <div class="eyebrow muted">badge · pill, 11 / 16 · 500</div>
  <div class="row gap-sm" style="flex-wrap:wrap">
    <span class="badge b-default">기본</span>
    <span class="badge b-primary">활성</span>
    <span class="badge b-success">완료</span>
    <span class="badge b-warning">확인 필요</span>
    <span class="badge b-info">정보</span>
    <span class="badge b-destructive">오류</span>
    <span class="badge b-outline">outline</span>
  </div>
  <div class="row gap-sm" style="flex-wrap:wrap">
    <span class="badge b-default"><span class="dot-status dot-status--idle"></span>대기</span>
    <span class="badge b-default"><span class="dot-status dot-status--thinking"></span>생각 중</span>
    <span class="badge b-default"><span class="dot-status dot-status--running"></span>실행 중</span>
    <span class="badge b-default"><span class="dot-status dot-status--done"></span>완료</span>
  </div>
</div></body></html>
