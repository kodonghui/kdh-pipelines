<!doctype html><html data-theme="paper" lang="ko"><head>
<meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<title>Colors — Semantic signals</title>
</head><body><div class="card col gap-lg">
  <div class="eyebrow muted">signals — color is a signal, never a wash</div>
  <div class="row gap-xl" style="flex-wrap:wrap;">
    <div class="col gap-xs"><div class="swatch" style="background:hsl(358 68% 42%)"></div>
      <div class="token-label">destructive</div><div class="token-meta">358 68% 42%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(155 55% 32%)"></div>
      <div class="token-label">success</div><div class="token-meta">155 55% 32%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(32 85% 44%)"></div>
      <div class="token-label">warning</div><div class="token-meta">32 85% 44%</div></div>
    <div class="col gap-xs"><div class="swatch" style="background:hsl(212 60% 40%)"></div>
      <div class="token-label">info</div><div class="token-meta">212 60% 40%</div></div>
  </div>
  <div class="row gap-sm" style="margin-top:4px;">
    <span class="dot-status dot-status--idle"></span><span class="body-sm">idle</span>
    <span style="width:16px"></span>
    <span class="dot-status dot-status--thinking"></span><span class="body-sm">thinking</span>
    <span style="width:16px"></span>
    <span class="dot-status dot-status--running"></span><span class="body-sm">running</span>
    <span style="width:16px"></span>
    <span class="dot-status dot-status--done"></span><span class="body-sm">done</span>
    <span style="width:16px"></span>
    <span class="dot-status dot-status--error"></span><span class="body-sm">error</span>
  </div>
</div></body></html>
