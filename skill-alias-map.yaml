# ─── End of aliases ─────────────────────────────────────────────────────

# Resolution algorithm (R-22 SSoT):
#   1. caller invokes alias X
#   2. resolver finds entry where (alias == X) AND (caller_context ∈ allowed_scope)
#   3. if status == blocked  → error with fallback message
#      if status == tombstone → emit redirect notice, then resolve target
#      if status == deferred  → resolve with experimental tag
#      if status == active    → resolve target
#   4. if caller_context ∈ blocked_scope → fail-closed (no alias resolution)
#   5. apply argument_translation_map (옛 args → 새 args)
#   6. if R-26 trigger condition met AND alias ∉ whitelist_skip → CEO Confirmation Prompt
#   7. if R-27 semantic ambiguity → Plane 4 (C) escalation, NOT alias resolver
#
# End of skill-alias-map.yaml v1.0.0
